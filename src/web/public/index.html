<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>CodeGraph</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%230f172a'/%3E%3Ccircle cx='6' cy='6' r='2.4' fill='none' stroke='%2322d3ee' stroke-width='1.6'/%3E%3Ccircle cx='18' cy='6' r='2.4' fill='none' stroke='%2322d3ee' stroke-width='1.6'/%3E%3Ccircle cx='12' cy='18' r='2.4' fill='none' stroke='%2322d3ee' stroke-width='1.6'/%3E%3Cpath d='M8 6h8M7.5 7.2 11 16M16.5 7.2 13 16' stroke='%2322d3ee' stroke-width='1.4'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <circle cx="6" cy="6" r="2.4" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="18" cy="6" r="2.4" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="12" cy="18" r="2.4" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <line x1="7.7" y1="7.2" x2="11" y2="16" stroke="currentColor" stroke-width="1.4"/>
          <line x1="16.3" y1="7.2" x2="13" y2="16" stroke="currentColor" stroke-width="1.4"/>
          <line x1="8.4" y1="6" x2="15.6" y2="6" stroke="currentColor" stroke-width="1.4"/>
        </svg>
        <span class="brand-name">CodeGraph</span>
        <span class="brand-sep" aria-hidden="true">/</span>
        <span class="brand-sub">图谱</span>
      </div>
      <form class="project-switcher" id="project-form" title="输入项目根目录或 .codegraph 目录后加载">
        <input class="project" id="project-path" type="text" placeholder="项目根目录或 .codegraph 路径" autocomplete="off" spellcheck="false" aria-label="项目根目录或 .codegraph 路径">
        <button class="btn project-browse" id="btn-project-browse" type="button" title="浏览本机目录">浏览</button>
        <button class="btn project-load" id="btn-project-load" type="submit" title="加载这个 CodeGraph 索引">加载</button>
      </form>
      <div class="actions">
        <button class="btn" id="btn-reset" type="button" title="清空焦点和图谱">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M3 4v5h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>重置</span>
        </button>
        <button class="btn" id="btn-refresh" type="button" title="重新获取当前视图">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>刷新</span>
        </button>
        <button class="btn btn-icon" id="btn-theme" type="button" title="切换主题" aria-label="切换主题">
          <span class="theme-icon" aria-hidden="true">🌙</span>
          <span class="btn-label">主题</span>
        </button>
      </div>
    </header>

    <!-- Left sidebar: search -->
    <aside class="panel left">
      <div class="stats" id="stats" aria-label="图谱统计">
        <div class="stat">
          <span class="num" id="stat-files">—</span>
          <span class="lbl">文件</span>
        </div>
        <div class="stat">
          <span class="num" id="stat-nodes">—</span>
          <span class="lbl">节点</span>
        </div>
        <div class="stat">
          <span class="num" id="stat-edges">—</span>
          <span class="lbl">边</span>
        </div>
        <div class="stat stat-update" id="stat-update-wrap" hidden>
          <span class="lbl">更新</span>
          <span class="num mono" id="stat-update">—</span>
        </div>
      </div>
      <div class="search-block">
        <div class="search-input-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <path d="M21 21l-4.3-4.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input id="search-input" type="search" placeholder="搜索符号…" autocomplete="off" spellcheck="false" aria-label="搜索符号">
        </div>
        <div class="kind-chips" id="kind-chips" role="toolbar" aria-label="按节点类型筛选"></div>
        <div class="filter-section">
          <div class="filter-section-label">装饰器标签</div>
          <div class="kind-chips" id="decorator-chips"></div>
        </div>
      </div>
      <div class="results" id="results" aria-live="polite">
        <div class="results-empty" id="results-empty">输入关键词开始搜索…</div>
      </div>
    </aside>

    <!-- Main canvas -->
    <main class="canvas-wrap">
      <div class="canvas-toolbar">
        <div class="layout-picker">
          <label for="layout-select">布局</label>
          <select id="layout-select" aria-label="图谱布局">
            <option value="cose">力导向 (cose)</option>
            <option value="breadthfirst">层级</option>
            <option value="circle">圆形</option>
            <option value="grid">网格</option>
            <option value="concentric">同心圆</option>
          </select>
        </div>
        <div class="canvas-meta mono" id="canvas-meta"></div>
      </div>
      <div id="cy" role="application" aria-label="代码图谱"></div>

      <div class="empty-state" id="empty-state">
        <div class="empty-orb" aria-hidden="true"></div>
        <h2>搜索一个符号开始探索</h2>
        <p>查找函数、类或方法；它的调用方、被调用方和周边图谱会显示在这里。</p>
      </div>

      <div class="no-conn-msg" id="no-conn-msg" hidden role="status"></div>
    </main>

    <!-- Right sidebar: detail -->
    <aside class="panel right">
      <div class="detail-empty" id="detail-empty">
        <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
          <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <path d="M9 9.5a3 3 0 1 1 4.5 2.6c-.7.4-1.5 1-1.5 2M12 17.5h.01" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p>选择一个节点查看详情。</p>
      </div>
      <div class="detail" id="detail" hidden>
        <div class="detail-head">
          <div class="detail-kind" id="detail-kind">—</div>
          <h3 class="detail-name mono" id="detail-name">—</h3>
          <div class="detail-sig mono" id="detail-sig"></div>
          <div class="detail-loc mono" id="detail-loc"></div>
        </div>
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="code" type="button" role="tab" aria-selected="true">源码</button>
          <button class="tab" data-tab="callers" type="button" role="tab" aria-selected="false">调用方 <span class="badge" id="badge-callers">0</span></button>
          <button class="tab" data-tab="callees" type="button" role="tab" aria-selected="false">被调用 <span class="badge" id="badge-callees">0</span></button>
        </div>
        <div class="tab-panes">
          <div class="tab-pane active" data-pane="code" role="tabpanel">
            <pre class="code-block mono" id="code-block">加载中…</pre>
          </div>
          <div class="tab-pane" data-pane="callers" role="tabpanel">
            <ul class="ref-list" id="callers-list"></ul>
          </div>
          <div class="tab-pane" data-pane="callees" role="tabpanel">
            <ul class="ref-list" id="callees-list"></ul>
          </div>
        </div>
        <div class="detail-actions">
          <button class="btn primary" id="btn-expand" type="button" title="以深度 3 重新获取上下文">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
              <path d="M4 9V4h5M20 15v5h-5M4 4l5 5M20 20l-5-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>展开邻域 · 深度 3</span>
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- 提示消息 -->
  <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="false"></div>

  <!-- 图节点悬浮提示 -->
  <div class="tooltip" id="tooltip" role="tooltip" hidden></div>

  <div class="modal-backdrop" id="browse-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="browse-title">
      <div class="modal-head">
        <div>
          <h2 id="browse-title">选择 CodeGraph 目录</h2>
          <p>选择项目根目录，或直接选择该项目下的 <code>.codegraph</code> 目录。</p>
        </div>
        <button class="btn" id="btn-browse-close" type="button">关闭</button>
      </div>
      <div class="browse-path mono" id="browse-path">—</div>
      <div class="browse-actions">
        <button class="btn" id="btn-browse-parent" type="button">上一级</button>
        <button class="btn" id="btn-browse-roots" type="button">磁盘根目录</button>
        <button class="btn primary" id="btn-browse-select-current" type="button">加载当前目录</button>
      </div>
      <div class="browse-list" id="browse-list" role="list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
